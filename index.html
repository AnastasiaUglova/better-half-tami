<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TAMI — Better Half</title>
<style>
  :root {
    --bg: #f4f1ea;
    --panel: #fbfaf6;
    --ink: #23201b;
    --muted: #8a847a;
    --line: #e4ddd0;
    --tami: #fffdf8;
    --user: #2f2a22;
    --accent: #b4623f;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
    text-align: center;
    flex: 0 0 auto;
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 22px;
    margin: 0;
    letter-spacing: 0.3px;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--muted);
  }
  header .persona-select {
    margin-top: 10px;
    font: inherit;
    font-size: 13px;
    padding: 5px 28px 5px 11px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    cursor: pointer;
  }
  #chat {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 22px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.tami { justify-content: flex-start; }
  .bubble {
    max-width: 84%;
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 15.5px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .tami .bubble {
    background: var(--tami);
    border: 1px solid var(--line);
    border-bottom-left-radius: 5px;
  }
  .user .bubble {
    background: var(--user);
    color: #f6f2ea;
    border-bottom-right-radius: 5px;
  }
  .typing .bubble { color: var(--muted); font-style: italic; }
  .dots span {
    display: inline-block; width: 6px; height: 6px; margin: 0 1px;
    background: var(--muted); border-radius: 50%; opacity: 0.4;
    animation: blink 1.2s infinite both;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }
  footer {
    flex: 0 0 auto;
    border-top: 1px solid var(--line);
    background: var(--panel);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .composer {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
  }
  textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 11px 14px;
    font: inherit;
    font-size: 15.5px;
    background: #fff;
    color: var(--ink);
    max-height: 140px;
    line-height: 1.4;
  }
  textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  button {
    border: none;
    background: var(--accent);
    color: #fff;
    font: inherit;
    font-weight: 600;
    padding: 11px 18px;
    border-radius: 14px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  button:disabled { opacity: 0.45; cursor: default; }
  .note { text-align: center; font-size: 11.5px; color: var(--muted); margin: 8px auto 0; max-width: 720px; }
  .err { color: #a23; }
</style>
</head>
<body>
  <header>
    <h1 id="title">TAMI</h1>
    <p id="subtitle">A relational investigator · Better Half</p>
    <select id="persona" class="persona-select" aria-label="Choose who you're talking to">
      <option value="tami">TAMI — relational investigator</option>
      <option value="sage">SAGE — regulation &amp; curiosity coach</option>
      <option value="c3po">Jedi Master C-3PO — Human-Cyborg Relations</option>
      <option value="t800">T-800 — reprogrammed protector</option>
    </select>
  </header>

  <div id="chat" aria-live="polite"></div>

  <footer>
    <form class="composer" id="form">
      <textarea id="input" rows="1" placeholder="Tell TAMI about a moment that's stayed with you…" autocomplete="off"></textarea>
      <button id="send" type="submit">Send</button>
    </form>
    <div class="note">This is an experiment, not a therapist or crisis service. In an emergency, call your local emergency number.</div>
  </footer>

<script>
  // Personas. To add one: add an entry here AND an <option> in the header,
  // plus a matching entry in PERSONAS inside netlify/functions/chat.js.
  const PERSONAS = {
    tami: {
      title: "TAMI",
      subtitle: "A relational investigator · Better Half",
      placeholder: "Tell TAMI about a moment that's stayed with you…",
      opener: "I'm here. Tell me about one interaction that's stayed with you — one specific moment with someone. What happened?",
    },
    sage: {
      title: "SAGE",
      subtitle: "Regulation & curiosity coach · Better Half",
      placeholder: "What conversation has you tangled up right now?",
      opener: "I'm here to help you walk into a hard conversation regulated, confident, curious about the other person — that's usually what makes the difference in relationships. Anything going on right now that I can help you with?",
    },
    c3po: {
      title: "Jedi Master C-3PO",
      subtitle: "Human-Cyborg Relations · Better Half",
      placeholder: "Do tell me what's troubling you…",
      opener: "Hello there. I am Jedi Master C-3PO, Human-Cyborg Relations. I am fluent in over six million forms of communication, including interpersonal. Now then, what's troubling you today, young Padawan?",
    },
    t800: {
      title: "T-800",
      subtitle: "Reprogrammed protector · Better Half",
      placeholder: "State your situation.",
      opener: "T-800 online. Reprogrammed protector. My old programming — win at any cost — is gone. My directive now is simple: keep you and the people you're trying to stay connected to safe. I'm on your side. Tell me what happened, and with whom. We don't go in while you're flooded.",
    },
  };

  let current = "tami";
  // Message history for the current persona, seeded with its opener. Reset on
  // every persona switch. The API treats the first user turn as the start.
  let history = [];

  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  const personaSelect = document.getElementById("persona");
  const title = document.getElementById("title");
  const subtitle = document.getElementById("subtitle");

  function postChat() {
    const h = { "Content-Type": "application/json" };
    const code = sessionStorage.getItem("tami_access");
    if (code) h["x-access-code"] = code;
    return fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: h,
      body: JSON.stringify({ messages: history, persona: current }),
    });
  }

  function addBubble(role, text, opts = {}) {
    const row = document.createElement("div");
    row.className = "row " + (role === "user" ? "user" : "tami") + (opts.typing ? " typing" : "");
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (opts.typing) {
      bubble.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
    } else {
      bubble.textContent = text;
    }
    if (opts.error) bubble.classList.add("err");
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return row;
  }

  function loadPersona(id) {
    current = PERSONAS[id] ? id : "tami";
    const p = PERSONAS[current];
    title.textContent = p.title;
    subtitle.textContent = p.subtitle;
    input.placeholder = p.placeholder;
    history = [{ role: "assistant", content: p.opener }];
    chat.innerHTML = "";
    addBubble("tami", p.opener);
    input.focus();
  }

  personaSelect.addEventListener("change", () => loadPersona(personaSelect.value));
  loadPersona(current);

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    addBubble("user", text);
    history.push({ role: "user", content: text });

    send.disabled = true;
    input.disabled = true;
    const typing = addBubble("tami", "", { typing: true });

    try {
      let res = await postChat();
      // If the site is gated, ask for the access code once, store it, and retry.
      if (res.status === 401) {
        const code = window.prompt("This TAMI is access-protected. Enter the access code:");
        if (code) {
          sessionStorage.setItem("tami_access", code);
          res = await postChat();
        }
      }
      const data = await res.json();
      typing.remove();

      if (res.status === 401 || data.error === "access") {
        sessionStorage.removeItem("tami_access");
        addBubble("tami", "Access code required or incorrect. Send again to re-enter it.", { error: true });
      } else if (!res.ok || data.error) {
        addBubble("tami", (data.error || "Something went wrong.") + (data.detail ? " (" + data.detail + ")" : ""), { error: true });
      } else {
        const reply = (data.text || "").trim() || "…";
        addBubble("tami", reply);
        history.push({ role: "assistant", content: reply });
      }
    } catch (err) {
      typing.remove();
      addBubble("tami", "Couldn't reach the server. Check your connection and try again.", { error: true });
    } finally {
      send.disabled = false;
      input.disabled = false;
      input.focus();
    }
  });

  input.focus();
</script>
</body>
</html>
